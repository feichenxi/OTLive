[env:esp32-s3-n16r8]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
upload_port = COM20
monitor_speed = 115200
lib_deps = 
    bblanchon/ArduinoJson@^6.21.3
board_build.filesystem = spiffs
board_build.partitions = partitions.csv
